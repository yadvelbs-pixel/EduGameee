<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Racha | Crear cuenta</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}


body{

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,#7C3AED,#5B21B6,#A855F7);

}


/* TARJETA PRINCIPAL */

.registro-card{

width:430px;

background:white;

border-radius:35px;

padding:35px 45px;

box-shadow:0 25px 60px rgba(0,0,0,.25);

text-align:center;

animation:aparecer .8s ease;

}


@keyframes aparecer{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* MASCOTA */

.mascota img{

width:160px;

animation:saltar 3s infinite ease-in-out;

}



@keyframes saltar{

0%,100%{

transform:translateY(0);

}

50%{

transform:translateY(-12px);

}

}



/* TEXTOS */


h1{

font-size:34px;

color:#5B21B6;

margin-top:10px;

}



.descripcion{

color:#777;

font-size:15px;

line-height:1.6;

margin:10px 0 30px;

}



/* CAMPOS */


.campo{

text-align:left;

margin-bottom:18px;

}


.campo label{

display:block;

font-weight:600;

font-size:14px;

color:#444;

margin-bottom:7px;

}


.campo input{

width:100%;

padding:15px;

border-radius:15px;

border:2px solid #E5E7EB;

font-size:15px;

background:#fafafa;

transition:.3s;

}

.password-box{
position:relative;
}

.password-box input{
padding-right:45px;
}

.ojo{

position:absolute;
right:15px;
top:50%;

transform:translateY(-50%);

cursor:pointer;

font-size:18px;

color:#777;

}

.ojo svg{
width:100%;
height:100%;
}


.campo input:focus{

outline:none;

border-color:#7C3AED;

background:white;

box-shadow:0 0 0 5px rgba(124,58,237,.15);

}


/* BOTÓN */


button{

width:100%;

padding:16px;

border:none;

border-radius:50px;

background:linear-gradient(90deg,#4ADE80,#22C55E);

color:white;

font-size:18px;

font-weight:600;

cursor:pointer;

margin-top:10px;

transition:.3s;

}


button:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(34,197,94,.35);

}



#mensaje{

margin-top:15px;

font-size:14px;

font-weight:600;

}


/* LINK */


.login{

margin-top:25px;

font-size:14px;

}


.login a{

color:#ac80f8;

font-weight:700;

text-decoration:none;

}


</style>


</head>

<body>


<div class="registro-card">


<div class="mascota">

<img src="images/rachii.png" alt="Sparki">

</div>


<h1>¡Empieza tu Racha!</h1>


<p class="descripcion">

Crea tu cuenta y aprende matemáticas jugando.

</p>


<form id="registroForm">


<div class="campo">

<label>
Correo electrónico
</label>

<input 
type="email"
id="email"
placeholder="ejemplo@gmail.com"
required>

</div>


<div class="campo">

<label>
Contraseña
</label>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">

<div class="campo">

<label>Nombre</label>

<input
type="text"
id="nombre"
placeholder="Tu nombre"
required>

</div>

<div class="campo">

<label>Apellido</label>

<input
type="text"
id="apellido"
placeholder="Tu apellido"
required>

</div>

</div>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">

<div class="campo">

<label>Edad</label>

<input
type="number"
id="edad"
placeholder="Edad"
min="6"
max="100"
required>

</div>

<div class="campo">

<label>Grado</label>

<select
id="grado"
required
style="width:100%;padding:15px;border-radius:15px;border:2px solid #E5E7EB;background:#fafafa;font-size:15px;">

<option value="">Selecciona</option>

<option>1° Primaria</option>
<option>2° Primaria</option>
<option>3° Primaria</option>
<option>4° Primaria</option>
<option>5° Primaria</option>
<option>6° Primaria</option>

<option>1° Secundaria</option>
<option>2° Secundaria</option>
<option>3° Secundaria</option>
<option>4° Secundaria</option>
<option>5° Secundaria</option>

</select>

</div>

</div>
<div class="password-box">

<input 
type="password"
id="password"
placeholder="Mínimo 6 caracteres"
required>


<span class="ojo" id="ojoPassword">
◉
</span>


</div>

</div>



<div class="campo">

<label>
Confirmar contraseña
</label>


<div class="password-box">

<input 
type="password"
id="confirmPassword"
placeholder="Repite tu contraseña"
required>


<span class="ojo" id="ojoConfirm">
◉
</span>


</div>

</div>



<button type="submit">

Crear mi cuenta

</button>


<p id="mensaje"></p>


</form>




<div class="login">

¿Ya tienes una cuenta?

<a href="login.html">

Iniciar sesión

</a>

</div>



</div>


<script type="module">


// Firebase

import { initializeApp } from 
"https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";


import {

getAuth,

createUserWithEmailAndPassword

}

from 

"https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";





const firebaseConfig = {


apiKey: "AIzaSyDW4w9TOyboiDPjvxjiFrExPSjuX18Wshk",

authDomain: "edugame-340db.firebaseapp.com",

projectId: "edugame-340db",

storageBucket: "edugame-340db.firebasestorage.app",

messagingSenderId: "150012921820",

appId: "1:150012921820:web:08a6a4aa18ae5a29ef3119"

};





const app = initializeApp(firebaseConfig);


const auth = getAuth(app);





const formulario = document.getElementById("registroForm");


const mensaje = document.getElementById("mensaje");





formulario.addEventListener("submit",(e)=>{


e.preventDefault();



const email = document.getElementById("email").value;


const password = document.getElementById("password").value;


const confirmPassword = document.getElementById("confirmPassword").value;





if(password !== confirmPassword){


mensaje.style.color="red";

mensaje.textContent="Las contraseñas no coinciden";


return;


}





if(password.length < 6){


mensaje.style.color="red";

mensaje.textContent="La contraseña debe tener mínimo 6 caracteres";


return;


}





createUserWithEmailAndPassword(auth,email,password)


.then(()=>{


mensaje.style.color="#22C55E";


mensaje.textContent="¡Cuenta creada correctamente!";


setTimeout(()=>{


window.location.href="login.html";


},1500);



})



.catch((error)=>{


mensaje.style.color="red";



if(error.code === "auth/email-already-in-use"){


mensaje.textContent="Este correo ya está registrado";


}


else if(error.code === "auth/invalid-email"){


mensaje.textContent="El correo no es válido";


}


else{


mensaje.textContent=" Ocurrió un error al crear la cuenta";


}



});



});

const ojoPassword = document.getElementById("ojoPassword");
const password = document.getElementById("password");


ojoPassword.addEventListener("click", ()=>{

if(password.type === "password"){

password.type = "text";

}

else{

password.type = "password";

}

});

const ojoConfirm = document.getElementById("ojoConfirm");
const confirmPassword = document.getElementById("confirmPassword");


ojoConfirm.addEventListener("click", ()=>{

if(confirmPassword.type === "password"){

confirmPassword.type = "text";

}

else{

confirmPassword.type = "password";

}

});

</script>



</body>

</html>
